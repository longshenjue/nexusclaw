services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SANDBOX_IMAGE: claw-sandbox
      SANDBOX_NETWORK: nexusclaw_network
      SANDBOX_POOL_MIN: "3"
      SANDBOX_POOL_MAX: "5"
      SANDBOX_IDLE_TTL: "1800"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis_data:

networks:
  default:
    name: nexusclaw_network
